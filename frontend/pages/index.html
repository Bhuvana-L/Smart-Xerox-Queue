<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#7c3aed"/>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="apple-touch-icon" href="/pages/icon-192.png"/>
  <title>Smart Xerox Queue</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <style>body{font-family:'Inter',sans-serif}</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-violet-50 to-gray-100 flex items-center justify-center p-4">

<div class="w-full max-w-2xl text-center">
  <!-- Logo & Title -->
  <div class="mb-10">
    <div class="inline-flex items-center justify-center w-20 h-20 bg-violet-100 rounded-2xl mb-4">
      <i class="ti ti-printer text-violet-600 text-4xl"></i>
    </div>
    <h1 class="text-3xl font-bold text-gray-900">Smart Xerox Queue</h1>
    <p class="text-gray-500 mt-2">Print smarter, wait less</p>
  </div>

  <!-- Two Big Boxes -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <!-- Shop Owner Box -->
    <a href="owner-login.html"
      class="bg-white border-2 border-gray-200 rounded-2xl p-8 hover:border-violet-400 hover:shadow-lg transition-all group cursor-pointer block">
      <div class="w-16 h-16 bg-emerald-100 rounded-2xl flex items-center justify-center mx-auto mb-4 group-hover:bg-emerald-200 transition">
        <i class="ti ti-building-store text-emerald-600 text-3xl"></i>
      </div>
      <h2 class="text-xl font-semibold text-gray-900 mb-2">Shop Owner</h2>
      <p class="text-gray-500 text-sm">Manage print queue, set pricing, track orders</p>
    </a>

    <!-- Student Box -->
    <a href="student-login.html"
      class="bg-white border-2 border-gray-200 rounded-2xl p-8 hover:border-violet-400 hover:shadow-lg transition-all group cursor-pointer block">
      <div class="w-16 h-16 bg-violet-100 rounded-2xl flex items-center justify-center mx-auto mb-4 group-hover:bg-violet-200 transition">
        <i class="ti ti-school text-violet-600 text-3xl"></i>
      </div>
      <h2 class="text-xl font-semibold text-gray-900 mb-2">Student</h2>
      <p class="text-gray-500 text-sm">Upload documents, customize print, track orders</p>
    </a>
  </div>
</div>

<script>
// Register Service Worker for PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

// If already logged in, redirect
const user = JSON.parse(localStorage.getItem('user') || '{}');
if (localStorage.getItem('token')) {
  if (user.role === 'owner' || user.role === 'admin') window.location.href = 'owner.html';
  else window.location.href = 'dashboard.html';
}
</script>
</body>
</html>
