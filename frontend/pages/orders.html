<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Orders — Smart Xerox Queue</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>body{font-family:'Inter',sans-serif}</style>
</head>
<body class="bg-gray-50 min-h-screen">
<nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between sticky top-0 z-50">
  <div class="flex items-center gap-3">
    <div class="w-9 h-9 bg-violet-100 rounded-xl flex items-center justify-center"><i class="ti ti-printer text-violet-600 text-lg"></i></div>
    <span class="font-semibold text-gray-900">My Orders</span>
  </div>
  <div class="flex items-center gap-3">
    <a href="dashboard.html" class="text-sm text-violet-600 hover:underline flex items-center gap-1"><i class="ti ti-plus"></i> New Order</a>
    <button onclick="logout()" class="text-sm text-gray-500 hover:text-gray-800 flex items-center gap-1"><i class="ti ti-logout"></i> Logout</button>
  </div>
</nav>
<div class="max-w-4xl mx-auto px-4 py-8">
  <h2 class="text-xl font-semibold text-gray-900 mb-6">Your print orders</h2>
  <div id="orders-list" class="space-y-4"><div class="text-center text-gray-400 py-16">Loading orders...</div></div>
</div>

<script>
const API = window.location.port === '5000' ? '/api' : 'http://localhost:5000/api';
const token = localStorage.getItem('token');
if (!token) window.location.href = 'index.html';

const STATUS_STEPS = {waiting:1,processing:2,printing:3,ready:4,completed:5};
const STATUS_COLOR = {waiting:'bg-gray-100 text-gray-600',processing:'bg-blue-100 text-blue-700',printing:'bg-violet-100 text-violet-700',ready:'bg-green-100 text-green-700',completed:'bg-green-100 text-green-700',cancelled:'bg-red-100 text-red-600'};

const socket = io(window.location.origin);

async function loadOrders() {
  const res = await fetch(API+'/orders/my', { headers:{'Authorization':'Bearer '+token} });
  const orders = await res.json();
  const container = document.getElementById('orders-list');
  if (!orders.length) { container.innerHTML='<div class="text-center text-gray-400 py-16"><i class="ti ti-printer text-5xl block mb-3"></i>No orders yet. <a href="dashboard.html" class="text-violet-600 underline">Place your first order</a></div>'; return; }
  container.innerHTML = orders.map(o => {
    const step = STATUS_STEPS[o.status]||1;
    const bars = [1,2,3,4,5].map(i => `<div class="flex-1 h-1.5 ${i<=step?(o.status==='completed'?'bg-green-500':'bg-violet-500'):'bg-gray-200'} ${i===1?'rounded-l':i===5?'rounded-r':''}"></div>`).join('');
    return `<div class="bg-white border border-gray-200 rounded-2xl p-5" id="order-${o.token}">
      <div class="flex items-start justify-between mb-3">
        <div>
          <span class="text-lg font-semibold text-violet-600">${o.token}</span>
          <span class="ml-3 px-2 py-0.5 rounded-full text-xs ${STATUS_COLOR[o.status]||'bg-gray-100 text-gray-600'}">${o.status}</span>
        </div>
        <div class="text-right">
          <div class="text-lg font-semibold text-gray-900">₹${o.cost.total}</div>
          <div class="text-xs text-gray-400">${new Date(o.createdAt).toLocaleDateString()}</div>
        </div>
      </div>
      <div class="text-sm text-gray-600 mb-3">
        ${o.printSettings.totalPages} pages · ${o.printSettings.copies} cop. · ${o.printSettings.colorType} · ${o.printSettings.side} side · ${o.printSettings.binding}
      </div>
      <div class="flex gap-0.5 mb-1">${bars}</div>
      <div class="flex justify-between text-xs text-gray-400">
        <span>Waiting</span><span>Processing</span><span>Printing</span><span>Ready</span><span>Done</span>
      </div>
      ${o.status==='ready'?'<div class="mt-3 bg-green-50 border border-green-200 rounded-xl px-4 py-2.5 text-sm text-green-700 font-medium flex items-center gap-2"><i class="ti ti-check-circle"></i> Your document is ready for collection!</div>':''}
      ${['waiting','processing'].includes(o.status)?'<div class="mt-3 flex justify-end"><button onclick="cancelOrder(\''+o._id+'\',\''+o.token+'\')" class="text-xs border border-red-300 text-red-500 rounded-lg px-3 py-1.5 hover:bg-red-50 transition flex items-center gap-1"><i class="ti ti-trash"></i> Cancel Order</button></div>':''}
    </div>`;
  }).join('');

  orders.filter(o=>!['completed','cancelled'].includes(o.status)).forEach(o => {
    socket.emit('join-order', o.token);
  });
}

socket.on('status-update', ({token: t, status}) => {
  const el = document.getElementById('order-'+t);
  if (el) loadOrders();
});

function logout() { localStorage.clear(); window.location.href='index.html'; }

async function cancelOrder(orderId, orderToken) {
  if (!confirm('Cancel order ' + orderToken + '? This cannot be undone.')) return;
  if (!confirm('Are you sure? Order ' + orderToken + ' will be permanently deleted.')) return;
  const res = await fetch(API+'/orders/'+orderId, { method:'DELETE', headers:{'Authorization':'Bearer '+token} });
  if (res.ok) { loadOrders(); alert('Order ' + orderToken + ' cancelled.'); }
  else { const d = await res.json(); alert('Error: ' + (d.message || 'Failed to cancel')); }
}

loadOrders();
</script>
</body>
</html>
