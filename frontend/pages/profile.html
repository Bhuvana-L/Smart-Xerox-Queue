<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Profile — Smart Xerox Queue</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <style>body{font-family:'Inter',sans-serif}</style>
</head>
<body class="bg-gray-50 min-h-screen">
<nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between sticky top-0 z-50">
  <div class="flex items-center gap-3">
    <div class="w-9 h-9 bg-violet-100 rounded-xl flex items-center justify-center"><i class="ti ti-printer text-violet-600 text-lg"></i></div>
    <span class="font-semibold text-gray-900">My Profile</span>
  </div>
  <div class="flex items-center gap-3">
    <a href="dashboard.html" class="text-sm text-violet-600 hover:underline">Dashboard</a>
    <button onclick="logout()" class="text-sm text-gray-500 hover:text-gray-800"><i class="ti ti-logout"></i> Logout</button>
  </div>
</nav>
<div class="max-w-lg mx-auto px-4 py-8">
  <div class="bg-white border border-gray-200 rounded-2xl p-6 mb-4">
    <h3 class="font-semibold text-gray-900 mb-4">Personal Information</h3>
    <form onsubmit="saveProfile(event)" class="space-y-3">
      <div><label class="block text-xs text-gray-500 mb-1">Full Name</label><input id="p-name" class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-violet-300"/></div>
      <div><label class="block text-xs text-gray-500 mb-1">USN</label><input id="p-usn" class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-violet-300 uppercase"/></div>
      <div><label class="block text-xs text-gray-500 mb-1">Phone</label><input id="p-phone" type="tel" class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-violet-300"/></div>
      <div><label class="block text-xs text-gray-500 mb-1">College</label><input id="p-college" class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-violet-300"/></div>
      <div id="profile-msg" class="hidden text-sm rounded-lg px-3 py-2"></div>
      <button type="submit" class="bg-violet-600 hover:bg-violet-700 text-white font-medium py-2.5 px-5 rounded-xl text-sm transition">Save Changes</button>
    </form>
  </div>
  <div class="bg-white border border-gray-200 rounded-2xl p-6 mb-4">
    <h3 class="font-semibold text-gray-900 mb-4">Change Email</h3>
    <form onsubmit="changeEmail(event)" class="space-y-3">
      <div><label class="block text-xs text-gray-500 mb-1">New Email</label><input id="new-email" type="email" required class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-violet-300"/></div>
      <div><label class="block text-xs text-gray-500 mb-1">Confirm Password</label><input id="email-pwd" type="password" required class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-violet-300"/></div>
      <div id="email-msg" class="hidden text-sm rounded-lg px-3 py-2"></div>
      <button type="submit" class="bg-violet-600 hover:bg-violet-700 text-white font-medium py-2.5 px-5 rounded-xl text-sm transition">Update Email</button>
    </form>
  </div>
  <div class="bg-white border border-gray-200 rounded-2xl p-6">
    <h3 class="font-semibold text-gray-900 mb-4">Change Password</h3>
    <form onsubmit="changePwd(event)" class="space-y-3">
      <div><label class="block text-xs text-gray-500 mb-1">Current Password</label><input id="cur-pwd" type="password" required class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-violet-300"/></div>
      <div><label class="block text-xs text-gray-500 mb-1">New Password</label><input id="new-pwd" type="password" required class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-violet-300"/></div>
      <div id="pwd-msg" class="hidden text-sm rounded-lg px-3 py-2"></div>
      <button type="submit" class="bg-violet-600 hover:bg-violet-700 text-white font-medium py-2.5 px-5 rounded-xl text-sm transition">Update Password</button>
    </form>
  </div>
</div>
<script>
const API='http://localhost:5000/api'; const token=localStorage.getItem('token');
if(!token) window.location.href='index.html';
const user=JSON.parse(localStorage.getItem('user')||'{}');
document.getElementById('p-name').value=user.name||'';
document.getElementById('p-usn').value=user.usn||'';
document.getElementById('p-phone').value=user.phone||'';
document.getElementById('p-college').value=user.college||'';
document.getElementById('new-email').value=user.email||'';

function authFetch(url,opts={}){return fetch(API+url,{...opts,headers:{'Content-Type':'application/json','Authorization':'Bearer '+token,...(opts.headers||{})}});}
function showMsg(id,msg,ok){const el=document.getElementById(id);el.textContent=msg;el.className='text-sm rounded-lg px-3 py-2 '+(ok?'bg-green-50 text-green-700':'bg-red-50 text-red-600');}

async function saveProfile(e){e.preventDefault();
  const res=await authFetch('/auth/profile',{method:'PUT',body:JSON.stringify({name:document.getElementById('p-name').value,usn:document.getElementById('p-usn').value,phone:document.getElementById('p-phone').value,college:document.getElementById('p-college').value})});
  const d=await res.json(); if(res.ok){showMsg('profile-msg','Saved!',true);const u=JSON.parse(localStorage.getItem('user')||'{}');Object.assign(u,d);localStorage.setItem('user',JSON.stringify(u));}else showMsg('profile-msg',d.message,false);}

async function changeEmail(e){e.preventDefault();
  const res=await authFetch('/auth/change-email',{method:'PUT',body:JSON.stringify({email:document.getElementById('new-email').value,password:document.getElementById('email-pwd').value})});
  const d=await res.json();showMsg('email-msg',d.message||d.email,res.ok);}

async function changePwd(e){e.preventDefault();
  const res=await authFetch('/auth/change-password',{method:'PUT',body:JSON.stringify({currentPassword:document.getElementById('cur-pwd').value,newPassword:document.getElementById('new-pwd').value})});
  const d=await res.json();showMsg('pwd-msg',d.message,res.ok);}

function logout(){localStorage.clear();window.location.href='index.html';}
</script>
</body>
</html>
